# BITTADA — local dev stack.
# `make up` boots everything; `make logs` tails them; `make migrate` runs migrations.
# Production deploys should NOT use this file directly — see infra/k8s when ready.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bittada}
      POSTGRES_USER: ${POSTGRES_USER:-bittada}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bittada}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bittada}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-bittada}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-bittada-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
                --bind 0.0.0.0:8000
                --workers 4
                --access-logfile - --error-logfile -"

  channels:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8001 config.asgi:application"

  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config worker -l INFO --concurrency=4

  celery_beat:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config beat -l INFO

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - channels
    ports:
      - "80:80"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro

volumes:
  postgres_data:
  minio_data:
  backend_static:
  backend_media:
