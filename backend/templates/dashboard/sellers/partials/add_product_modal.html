{% load i18n %}

<div class="modal-content animate-fade-in" onclick="event.stopPropagation()">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0; font-weight: 900; color: #1E293B;">{% trans "Yangi mahsulot qo'shish" %}</h2>
        <button onclick="document.getElementById('modal-container').classList.remove('show')" 
                style="background: none; border: none; font-size: 24px; color: #94A3B8; cursor: pointer;">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <form hx-post="{% url 'dashboard:my_products' %}" hx-target="#product-grid" 
          hx-on::after-request="if(event.detail.successful) document.getElementById('modal-container').classList.remove('show')"
          enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
            <div class="form-field">
                <label style="font-size: 13px; font-weight: 700; color: #64748B;">{% trans "Mahsulot nomi (O'zb)" %}</label>
                <input type="text" name="title_uz" required class="search-input" style="width: 100%;">
            </div>
            <div class="form-field">
                <label style="font-size: 13px; font-weight: 700; color: #64748B;">{% trans "Kategoriya" %}</label>
                <select name="category" required class="category-select" style="width: 100%;">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name_uz }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-field">
                <label style="font-size: 13px; font-weight: 700; color: #64748B;">{% trans "Narxi (UZS)" %}</label>
                <input type="number" name="price" required class="search-input" style="width: 100%;">
            </div>
            <div class="form-field">
                <label style="font-size: 13px; font-weight: 700; color: #64748B;">{% trans "SKU" %}</label>
                <input type="text" name="sku" class="search-input" style="width: 100%;">
            </div>
        </div>

        <!-- Drag & Drop Area -->
        <div style="border: 2px dashed #E2E8F0; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 24px; cursor: pointer; transition: border-color 0.2s;"
             onmouseover="this.style.borderColor='var(--primary-brand)'"
             onmouseout="this.style.borderColor='#E2E8F0'"
             onclick="document.getElementById('product-image-input').click()">
            <i class="bi bi-cloud-arrow-up" style="font-size: 48px; color: var(--primary-brand); display: block; margin-bottom: 12px;"></i>
            <span style="font-weight: 700; color: #1E293B;">{% trans "Rasmlarni shu yerga tashlang" %}</span>
            <span style="display: block; font-size: 13px; color: #64748B; margin-top: 4px;">{% trans "yoki kompyuterdan yuklang" %}</span>
            <input type="file" id="product-image-input" name="images" multiple style="display: none;">
        </div>

        <button type="submit" class="btn-submit" style="width: 100%; padding: 14px; font-size: 16px;">
            {% trans "Mahsulotni yaratish" %}
        </button>
    </form>
</div>
