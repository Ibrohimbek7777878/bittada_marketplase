<div id="form-container" class="animate-fade-in">
    <div style="background: #ECFDF5; border: 1px solid #A7F3D0; padding: 20px; border-radius: 12px; text-align: center;">
        <i class="bi bi-check-circle" style="font-size: 32px; color: #057A55;"></i>
        <h4 style="margin: 12px 0 4px; color: #065F46; font-weight: 800;">{% trans "Muvaffaqiyatli saqlandi!" %}</h4>
        <p style="font-size: 13px; color: #065F46; opacity: 0.8;">{% trans "Ma'lumotlar tizimga kiritildi." %}</p>
        
        <button hx-get="{{ request.path }}" hx-target="#form-container" hx-swap="outerHTML" 
                style="margin-top: 16px; background: white; border: 1px solid #A7F3D0; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;">
            {% trans "Yana qo'shish" %}
        </button>
    </div>
</div>
