{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Rol tanlash" %} - Bittada{% endblock %}

{% block content %}
<section class="auth-section" style="min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);">
  <div class="container">
    <div class="role-selection-card" style="max-width: 500px; margin: 0 auto; background: white; border-radius: 24px; padding: 48px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); border: 1px solid #e2e8f0; animation: fadeInUp 0.6s ease-out;">
      <div class="text-center mb-48">
        <div class="auth-logo-icon" style="width: 64px; height: 64px; background: #A4D46C; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: 900; font-size: 28px; color: #001F3F;">B</div>
        <h1 class="auth-title" style="font-size: 28px; font-weight: 800; color: #0F172A; margin-bottom: 8px;">{% trans "Rolingizni tanlang" %}</h1>
        <p class="auth-subtitle" style="color: #64748B; font-size: 15px;">{% trans "Siz qaysi rolda ishlamoqchisiz?" %}</p>
      </div>

      <div class="role-options" style="display: flex; flex-direction: column; gap: 16px;">
        <button class="role-btn seller-role" data-role="seller" style="width: 100%; padding: 20px; border: 2px solid #E2E8F0; border-radius: 16px; background: white; cursor: pointer; transition: all 0.3s ease; text-align: left; display: flex; align-items: center; gap: 16px;">
          <div class="role-icon" style="width: 48px; height: 48px; background: #A4D46C; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;">🛍️</div>
          <div>
            <h3 style="font-weight: 700; color: #0F172A; margin-bottom: 4px;">{% trans "Sotuvchi" %}</h3>
            <p style="font-size: 13px; color: #64748B; margin: 0;">{% trans "Mahsulot yoki xizmat sotish" %}</p>
          </div>
        </button>

        <button class="role-btn customer-role" data-role="customer" style="width: 100%; padding: 20px; border: 2px solid #E2E8F0; border-radius: 16px; background: white; cursor: pointer; transition: all 0.3s ease; text-align: left; display: flex; align-items: center; gap: 16px;">
          <div class="role-icon" style="width: 48px; height: 48px; background: #3B82F6; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;">🛒</div>
          <div>
            <h3 style="font-weight: 700; color: #0F172A; margin-bottom: 4px;">{% trans "Xaridor" %}</h3>
            <p style="font-size: 13px; color: #64748B; margin: 0;">{% trans "Mahsulot va xizmatlarni sotib olish" %}</p>
          </div>
        </button>

        <button class="role-btn supplier-role" data-role="internal_supplier" style="width: 100%; padding: 20px; border: 2px solid #E2E8F0; border-radius: 16px; background: white; cursor: pointer; transition: all 0.3s ease; text-align: left; display: flex; align-items: center; gap: 16px;">
          <div class="role-icon" style="width: 48px; height: 48px; background: #8B5CF6; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;">🏭</div>
          <div>
            <h3 style="font-weight: 700; color: #0F172A; margin-bottom: 4px;">{% trans "Ichki ta'minotchi" %}</h3>
            <p style="font-size: 13px; color: #64748B; margin: 0;">{% trans "Material va komponent yetkazib berish" %}</p>
          </div>
        </button>
      </div>
    </div>
  </div>
</section>

<style>
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.role-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); border-color: #A4D46C; }
.role-btn.selected { border-color: #A4D46C; background: #f0fdf4; }
</style>

<script>
document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // Store selected role
    localStorage.setItem('selectedRole', btn.dataset.role);
    // Animate and redirect
    btn.style.transform = 'scale(0.95)';
    setTimeout(() => {
      window.location.href = '/register/';
    }, 200);
  });
});
</script>
{% endblock %}
