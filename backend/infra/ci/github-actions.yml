# GitHub Actions CI for Bittada.
# Move to `.github/workflows/ci.yml` once the repo is initialised.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: bittada
          POSTGRES_USER: bittada
          POSTGRES_DB: bittada
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bittada"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: test-key-not-secret
      DJANGO_DEBUG: "1"
      POSTGRES_HOST: localhost
      POSTGRES_DB: bittada
      POSTGRES_USER: bittada
      POSTGRES_PASSWORD: bittada
      REDIS_URL: redis://localhost:6379/0
      CHANNELS_REDIS_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: redis://localhost:6379/2
      CELERY_RESULT_BACKEND: redis://localhost:6379/3

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - run: pip install -r backend/requirements/dev.txt
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Type-check
        working-directory: backend
        run: mypy apps core
        continue-on-error: true   # tighten once the suite stabilises
      - name: Test
        working-directory: backend
        run: pytest --cov=apps --cov=core --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci || npm install
      - working-directory: frontend
        run: npm run build
