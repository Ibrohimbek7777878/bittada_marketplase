worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip — frontend Vite already produces precompressed assets in prod, but
    # keep this on for API responses.
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # Buffer caps — keep us safe from oversized headers.
    client_max_body_size 100M;
    large_client_header_buffers 4 16k;

    # Upstreams
    upstream backend  { server backend:8000; }
    upstream channels { server channels:8001; }

    # Security headers applied site-wide.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    server {
        listen 80;
        server_name _;

        # Static / media (mounted volumes from docker-compose).
        location /static/ { alias /var/www/static/; }
        location /media/  { alias /var/www/media/; }

        # WebSocket (Channels).
        location /ws/ {
            proxy_pass http://channels;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Everything else → Django.
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
